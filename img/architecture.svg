<svg viewBox="0 0 720 640" xmlns="http://www.w3.org/2000/svg" font-family="Calibri, Carlito, 'Segoe UI', sans-serif">
  <style>
    .lbl{font-weight:700;font-size:13px}
    .tile{font-size:11px;font-weight:700}
    .sub{font-size:9.5px}
    .layer{font-weight:700;font-size:11px;letter-spacing:.08em;text-transform:uppercase}
  </style>
  <rect width="720" height="640" fill="#ffffff"/>

  <!-- Layer 1: Users (slate / neutral) -->
  <rect x="20" y="20" width="680" height="74" rx="12" fill="#EEF0F4" stroke="#6A7488"/>
  <text x="36" y="42" class="layer" fill="#4a5363">Users &amp; Consumers</text>
  <g>
    <rect x="36" y="50" width="150" height="32" rx="7" fill="#fff" stroke="#6A7488"/><text x="111" y="70" text-anchor="middle" class="tile" fill="#2a3140">Governments</text>
    <rect x="200" y="50" width="150" height="32" rx="7" fill="#fff" stroke="#6A7488"/><text x="275" y="70" text-anchor="middle" class="tile" fill="#2a3140">Enterprises</text>
    <rect x="364" y="50" width="150" height="32" rx="7" fill="#fff" stroke="#6A7488"/><text x="439" y="70" text-anchor="middle" class="tile" fill="#2a3140">Researchers</text>
    <rect x="528" y="50" width="156" height="32" rx="7" fill="#fff" stroke="#6A7488"/><text x="606" y="70" text-anchor="middle" class="tile" fill="#2a3140">Community</text>
  </g>

  <!-- Layer 2: Experience / Intelligence (green) -->
  <rect x="20" y="110" width="680" height="104" rx="12" fill="#E5F3EC" stroke="#1E8E5A"/>
  <text x="36" y="132" class="layer" fill="#176e46">Experience &amp; Intelligence</text>
  <g>
    <rect x="36" y="140" width="120" height="58" rx="7" fill="#fff" stroke="#1E8E5A"/><text x="96" y="166" text-anchor="middle" class="tile" fill="#124e32">Dashboard</text><text x="96" y="180" text-anchor="middle" class="sub" fill="#176e46">Portal &amp; Explorer</text>
    <rect x="168" y="140" width="120" height="58" rx="7" fill="#fff" stroke="#1E8E5A"/><text x="228" y="166" text-anchor="middle" class="tile" fill="#124e32">Community</text><text x="228" y="180" text-anchor="middle" class="sub" fill="#176e46">Forum &amp; Academy</text>
    <rect x="300" y="140" width="120" height="58" rx="7" fill="#fff" stroke="#1E8E5A"/><text x="360" y="166" text-anchor="middle" class="tile" fill="#124e32">Analytics</text><text x="360" y="180" text-anchor="middle" class="sub" fill="#176e46">Sandbox &amp; Notebooks</text>
    <rect x="432" y="140" width="120" height="58" rx="7" fill="#fff" stroke="#1E8E5A"/><text x="492" y="166" text-anchor="middle" class="tile" fill="#124e32">AI Services</text><text x="492" y="180" text-anchor="middle" class="sub" fill="#176e46">Insights &amp; Recos</text>
    <rect x="564" y="140" width="120" height="58" rx="7" fill="#fff" stroke="#1E8E5A"/><text x="624" y="166" text-anchor="middle" class="tile" fill="#124e32">Model Registry</text><text x="624" y="180" text-anchor="middle" class="sub" fill="#176e46">Versioning</text>
  </g>

  <!-- Layer 3: Exchange & Governance (navy) -->
  <rect x="20" y="230" width="680" height="104" rx="12" fill="#E7EAF3" stroke="#1F3569"/>
  <text x="36" y="252" class="layer" fill="#1F3569">Exchange &amp; Governance</text>
  <g>
    <rect x="36" y="260" width="120" height="58" rx="7" fill="#fff" stroke="#1F3569"/><text x="96" y="286" text-anchor="middle" class="tile" fill="#1F3569">Data Discovery</text><text x="96" y="300" text-anchor="middle" class="sub" fill="#3a4a78">Catalog (JSON-LD)</text>
    <rect x="168" y="260" width="120" height="58" rx="7" fill="#fff" stroke="#1F3569"/><text x="228" y="286" text-anchor="middle" class="tile" fill="#1F3569">API Management</text><text x="228" y="300" text-anchor="middle" class="sub" fill="#3a4a78">Security &amp; Load</text>
    <rect x="300" y="260" width="120" height="58" rx="7" fill="#fff" stroke="#1F3569"/><text x="360" y="282" text-anchor="middle" class="tile" fill="#1F3569">Consent &amp;</text><text x="360" y="296" text-anchor="middle" class="tile" fill="#1F3569">Governance</text>
    <rect x="432" y="260" width="120" height="58" rx="7" fill="#fff" stroke="#1F3569"/><text x="492" y="286" text-anchor="middle" class="tile" fill="#1F3569">User Mgmt</text><text x="492" y="300" text-anchor="middle" class="sub" fill="#3a4a78">Identity / RBAC</text>
    <rect x="564" y="260" width="120" height="58" rx="7" fill="#fff" stroke="#1F3569"/><text x="624" y="286" text-anchor="middle" class="tile" fill="#1F3569">Auditing</text><text x="624" y="300" text-anchor="middle" class="sub" fill="#3a4a78">APIs / Downloads</text>
  </g>

  <!-- Layer 4: Data plane & Compute (teal) -->
  <rect x="20" y="350" width="680" height="104" rx="12" fill="#E2F1F2" stroke="#0E7C86"/>
  <text x="36" y="372" class="layer" fill="#0b626a">Data Plane &amp; Confidential Compute</text>
  <g>
    <rect x="36" y="380" width="160" height="58" rx="7" fill="#fff" stroke="#0E7C86"/><text x="116" y="406" text-anchor="middle" class="tile" fill="#0b4f56">Data Plane</text><text x="116" y="420" text-anchor="middle" class="sub" fill="#0b626a">JSON &#183; Files &#183; OGC</text>
    <rect x="208" y="380" width="160" height="58" rx="7" fill="#fff" stroke="#0E7C86"/><text x="288" y="406" text-anchor="middle" class="tile" fill="#0b4f56">Ingestion Adapters</text><text x="288" y="420" text-anchor="middle" class="sub" fill="#0b626a">APIs &#183; IoT &#183; Queues</text>
    <rect x="380" y="380" width="304" height="58" rx="7" fill="#fff" stroke="#0E7C86"/><text x="532" y="406" text-anchor="middle" class="tile" fill="#0b4f56">Trusted Execution Environment (TEE)</text><text x="532" y="420" text-anchor="middle" class="sub" fill="#0b626a">Confidential compute &#183; SMPC &#183; no data leakage</text>
  </g>

  <!-- Layer 5: Infrastructure base (navy solid) -->
  <rect x="20" y="470" width="680" height="62" rx="12" fill="#1F3569" stroke="#1F3569"/>
  <text x="360" y="498" text-anchor="middle" class="lbl" fill="#fff">Cloud-Native Foundation</text>
  <text x="360" y="516" text-anchor="middle" class="sub" fill="#c6cfe6">Containerized microservices &#183; Kubernetes &#183; CNCF principles &#183; portable to on-premises</text>

  <!-- Standards rail (orange accent label) -->
  <rect x="20" y="548" width="680" height="62" rx="12" fill="#F5F6F9" stroke="#E2E5EE"/>
  <text x="36" y="570" class="layer" fill="#C95E12">Standards &amp; Compliance</text>
  <text x="36" y="592" class="sub" fill="#4a5363">NGSI-LD &#183; OGC &#183; ETSI &#183; BIS &#183; JSON-LD &#183; OAuth2 / JWT &#183; OIDC / SAML &#183; DEPA &#183; FIWARE-compatible</text>

  <!-- flow arrows -->
  <g stroke="#6A7488" stroke-width="1.5" marker-end="url(#a)">
    <line x1="360" y1="94" x2="360" y2="108"/>
    <line x1="360" y1="214" x2="360" y2="228"/>
    <line x1="360" y1="334" x2="360" y2="348"/>
    <line x1="360" y1="454" x2="360" y2="468"/>
  </g>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#6A7488"/></marker>
  </defs>
</svg>
